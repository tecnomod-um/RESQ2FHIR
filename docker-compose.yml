version: "3.9"

services:
  # --- Infra para Snowstorm ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - node.name=snowstorm
      - cluster.name=snowstorm-cluster
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    volumes:
      - elastic:/usr/share/elasticsearch/data
    networks: [resqnet]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9200/_cluster/health?wait_for_status=green&timeout=90s"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    ports:
      - 127.0.0.1:9200:9200

  snowstorm:
    image: snomedinternational/snowstorm:latest
    container_name: snowstorm
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: >
      java -Xms2g -Xmx4g
      --add-opens java.base/java.lang=ALL-UNNAMED
      --add-opens=java.base/java.util=ALL-UNNAMED
      -cp @/app/jib-classpath-file
      org.snomed.snowstorm.SnowstormApplication
      --elasticsearch.urls=http://elasticsearch:9200
    networks:
      resqnet:
        aliases: [snowstorm]
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/fhir/metadata | grep -q 'CapabilityStatement'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  validator:
      build:
        context: ./fhir-validator        
        dockerfile: Dockerfile
      image: local/fhir-r5-validator-api:latest
      container_name: validator
      depends_on:
        snowstorm:
          condition: service_healthy
      environment:
        # Snowstorm expone FHIR Terminology R4. Usarlo SOLO para SNOMED mediante SnomedSnowstormValidator.
        APP_FHIR_SNOWSTORM_BASEURL: "http://snowstorm:8080/fhir"

        # Fallback terminológico remoto desactivado por defecto en R5:
        # algunos endpoints públicos rechazan fhirVersion=5.0.0 y generan HAPI-0710.
        APP_FHIR_TXBASEURL: ""

        # IG local con perfiles, extensiones, CodeSystems y ValueSets propios
        APP_FHIR_IGCLASSPATHPACKAGES: "classpath:/ig/RESQ-IG-5.2.8.tgz"
      networks:
        resqnet:
          aliases: [validator]
      ports:
        - "8085:8080" 
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/validate/health | grep -q '\"status\":\"UP\"'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 20s

  orchestrator-api:
    build: .
    image: local/resq2fhir-api:latest
    container_name: resq2fhir-api
    environment:
      WORKDIR: /app/workdir
      CONVERTER_CMD: python scripts/transform.py --input {in} --outdir {out}
      VALIDATOR_BASE_URL: "http://validator:8080"
      HAPI_BASE_URL: "http://hapi:8080/fhir"
      JOB_TAG_SYSTEM: "http://localhost:8090/job"
    volumes:
      - ./data:/app/data
      - ./workdir:/app/workdir
      - ./scripts:/app/scripts
    depends_on:
      validator:
        condition: service_healthy
      hapi:
        condition: service_healthy
    networks: [resqnet]
    ports:
      - "8090:8000"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: hapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - hapi_pgdata:/var/lib/postgresql/data
    networks: [resqnet]
    ports:
      # Exponlo si quieres acceso desde tu host psql; opcional:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hapi -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  hapi:
    image: hapiproject/hapi:v8.4.0-2-tomcat
    container_name: hapi-fhir
    depends_on:
      db:
        condition: service_healthy
    networks:
      resqnet:
        aliases: [hapi]
    ports:
      - "8082:8080"
    environment:
      # --- Fuerza perfil y DATASOURCE (evita H2) ---
      SPRING_PROFILES_ACTIVE: "postgres"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/hapi"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "admin"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"

      # Fuerza el dialecto de Postgres (corta cualquier intento de usar H2)
      SPRING_JPA_DATABASE_PLATFORM: "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect"
      # (opcional redundante pero útil si hay defaults internos)
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect"


      # --- FHIR en R5 (sin dudas) ---
      HAPI_FHIR_FHIR_VERSION: "R5"
      HAPI_FHIR_SERVER_ADDRESS: "http://localhost:8082/fhir"
      HAPI_FHIR_IG_RUNTIME_UPLOAD_ENABLED: "true"

      # --- Repositorio “relajado” (opcional) ---
      HAPI_FHIR_ENFORCE_REFERENTIAL_INTEGRITY_ON_WRITE: "false"
      HAPI_FHIR_ENFORCE_REFERENTIAL_INTEGRITY_ON_DELETE: "false"
      HAPI_FHIR_ALLOW_PLACEHOLDERS: "true"



       
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ':</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

networks:
  resqnet:

volumes:
  elastic:
  hapi_pgdata:
